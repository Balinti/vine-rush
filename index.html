    html,body{width:100%;height:100%;background:#0a1a04;display:flex;justify-content:center;align-items:center;overflow:hidden;font-family:'Segoe UI',sans-serif}
    #wrap{position:relative;width:420px;max-width:100vw;height:750px;max-height:100vh}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
(function(){
'use strict';

// ── Canvas setup ─────────────────────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio||1, 2);
let CW = 420, CH = 750;

function resize(){
  const r = wrap.getBoundingClientRect();
  CW = r.width; CH = r.height;
  canvas.width = CW * DPR; canvas.height = CH * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Constants ────────────────────────────────────────────────────────────────
const GRAVITY      = 900;
const SNAP_RADIUS  = 160;
const PLAYER_R     = 12;
const LEAF_R       = 10;
const THORN_R      = 9;
const SPIDER_R     = 11;
const NODE_R       = 9;
const SCROLL_BASE  = 120;
const LS_KEY       = 'vineRushHighScore';

// ── Game state ───────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'gameover'
let score, combo, bestScore = parseInt(localStorage.getItem(LS_KEY)||'0', 10);
let elapsed, phase, cameraX, distance;
let shakeAmt = 0, shakeX = 0, shakeY = 0;
let redFlash = 0, hue = 110;

// player
let px, py, pvx, pvy;
let anchored = false, anchorNode = null;
let swingAngle = 0, swingAngVel = 0, ropeLen = 0;

// world
let nodes, leaves, thorns, walls, spiders;
let particles, popTexts, speedLines;
let closeCalls, idCtr;

function mult(){ return 1 + Math.min(4, Math.floor(combo / 5)); }

// ── Init ─────────────────────────────────────────────────────────────────────
function initGame(){
  score = 0; combo = 0; elapsed = 0; phase = 0;
  cameraX = 0; distance = 0;
  shakeAmt = 0; shakeX = 0; shakeY = 0; redFlash = 0; hue = 110;
  anchored = false; anchorNode = null;
  nodes=[]; leaves=[]; thorns=[]; walls=[]; spiders=[];
  particles=[]; popTexts=[]; speedLines=[];
  closeCalls={}; idCtr=0;
  px = CW * 0.28; py = CH * 0.4;
  pvx = 80; pvy = 0;
  for(let i=0;i<8;i++) spawnChunk(i * 180, false);
}

// ── Spawning ─────────────────────────────────────────────────────────────────
function spawnChunk(baseX, withHaz){
  const count = 2 + Math.floor(Math.random()*2);
  for(let i=0;i<count;i++){
    const nx = baseX + 80 + Math.random()*120;
    const ny = 110 + Math.random()*(CH - 220);
    const dead = phase >= 4 && Math.random() < 0.1;
    nodes.push({ x:nx, y:ny, r:NODE_R, dead, id:idCtr++, w:Math.random()*Math.PI*2 });
    if(!dead && Math.random()<0.72){
      const gold = phase >= 3 && Math.random() < 0.28;
      const ang = -Math.PI*0.5 + (Math.random()-0.5)*Math.PI;
      const d2 = 42 + Math.random()*50;
      leaves.push({ x:nx+Math.cos(ang)*d2, y:ny+Math.sin(ang)*d2,
        r:LEAF_R, gold, id:idCtr++, alive:true, bob:Math.random()*Math.PI*2 });
    }
  }
  if(!withHaz) return;
  if(phase>=1 && Math.random()<0.5+phase*0.06){
    thorns.push({ x:baseX+90+Math.random()*110, y:80+Math.random()*(CH-160),
      r:THORN_R, id:idCtr++ });
  }
  if(phase>=2 && Math.random()<0.42){
    const wh = 60 + Math.random()*80;
    walls.push({ x:baseX+60+Math.random()*80, y:100+Math.random()*(CH-wh-200),
      w:18, h:wh, id:idCtr++ });
  }
  if(phase>=4 && Math.random()<0.38){
    spiders.push({ x:baseX+100+Math.random()*80, y:100+Math.random()*(CH-200),
      r:SPIDER_R, id:idCtr++,
      vx:-(22+Math.random()*32), vy:(Math.random()-0.5)*44,
      bo:Math.random()*Math.PI*2 });
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
function onInput(){
  if(state==='start'){ state='playing'; initGame(); return; }
  if(state==='gameover'){ state='playing'; initGame(); return; }
  if(state==='playing') toggleAnchor();
}
canvas.addEventListener('pointerdown', onInput);
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); onInput(); }
});

// ── Anchor ────────────────────────────────────────────────────────────────────
function toggleAnchor(){
  if(anchored){
    anchored = false; anchorNode = null;
    pvx += 60;
    if(Math.sqrt(pvx*pvx+pvy*pvy)>200) for(let i=0;i<6;i++) emitSpeedLine();
    burst(px, py, '#aaffaa', 6, 80);
  } else {
    const snapR = Math.max(75, SNAP_RADIUS - phase*9);
    let best=null, bestD=snapR;
    for(const n of nodes){
      if(n.dead) continue;
      const dx=n.x-cameraX-px, dy=n.y-py;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<bestD){ bestD=d; best=n; }
    }
    if(best){
      anchored=true; anchorNode=best;
      const dx=best.x-cameraX-px, dy=best.y-py;
      ropeLen=Math.sqrt(dx*dx+dy*dy);
      swingAngle=Math.atan2(py-best.y, px-(best.x-cameraX));
      swingAngVel=(pvx*Math.cos(swingAngle+Math.PI*0.5)+pvy*Math.sin(swingAngle+Math.PI*0.5))/Math.max(ropeLen,20);
      shake(2);
      burst(px, py, '#ffffaa', 8, 90);
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt){
  elapsed += dt;
  phase = elapsed>45?4 : elapsed>25?3 : elapsed>10?2 : elapsed>5?1 : 0;

  const scrollSpeed = SCROLL_BASE + phase*22 + elapsed*0.9;
  cameraX += scrollSpeed * dt;
  distance += scrollSpeed * dt;
  score += scrollSpeed * dt * 0.005 * mult();

  // spawn ahead
  const maxX = nodes.reduce((m,n)=>Math.max(m,n.x), cameraX);
  if(maxX < cameraX + CW + 420) spawnChunk(maxX + 40, elapsed > 5);

  // cull
  const cx = cameraX - 250;
  nodes   = nodes.filter(n=>n.x>cx);
  leaves  = leaves.filter(l=>l.alive && l.x>cx);
  thorns  = thorns.filter(t=>t.x>cx);
  walls   = walls.filter(w=>w.x>cx);
  spiders = spiders.filter(s=>s.x>cx);

  // spiders
  for(const s of spiders){
    s.x += s.vx*dt;
    s.y += s.vy*dt + Math.sin(elapsed*2+s.bo)*0.4;
    if(s.y<50||s.y>CH-50) s.vy*=-1;
  }

  // player physics
  if(anchored && anchorNode){
    const ax = anchorNode.x - cameraX;
    const ay = anchorNode.y;
    swingAngVel += (-GRAVITY/Math.max(ropeLen,20)*Math.sin(swingAngle))*dt;
    swingAngVel *= 0.998;
    swingAngle += swingAngVel * dt;
    ropeLen = Math.min(ropeLen + 18*dt, 230);
    px = ax + Math.sin(swingAngle)*ropeLen;
    py = ay - Math.cos(swingAngle)*ropeLen;
    pvx = swingAngVel*ropeLen*Math.cos(swingAngle);
    pvy = swingAngVel*ropeLen*Math.sin(swingAngle);
  } else {
    pvy += GRAVITY * dt;
    px  += pvx * dt;
    py  += pvy * dt;
    pvx += 28 * dt;
    pvy *= 0.9995;
  }

  // camera follow
  const target = CW * 0.28;
  const off = px - target;
  if(off > 0){ cameraX += off*dt*3; px -= off*dt*3; }

  // boundary
  if(py<-30||py>CH+80||px<-60){ triggerDeath(); return; }

  // leaves
  for(let i=leaves.length-1;i>=0;i--){
    const l=leaves[i];
    const lx=l.x-cameraX;
    const dx=lx-px, dy=l.y-py;
    if(dx*dx+dy*dy<(PLAYER_R+l.r)*(PLAYER_R+l.r)){
      leaves.splice(i,1);
      combo++;
      const m=mult(), pts=(l.gold?5:1)*m;
      score+=pts;
      burst(px,py,l.gold?'#ffd700':'#88ff44',l.gold?12:6,100);
      addPop(px,py,'+'+(l.gold?5:1)+(m>1?' x'+m:''),l.gold?'#ffd700':'#aaffaa');
    }
  }

  // thorns
  for(const t of thorns){
    const tx=t.x-cameraX, dx=tx-px, dy=t.y-py;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<PLAYER_R+t.r-2){ triggerDeath(); return; }
    if(d<PLAYER_R+t.r+20 && !closeCalls[t.id]){
      closeCalls[t.id]=1; const pts=2*mult(); score+=pts;
      addPop(px,py,'CLOSE! +'+pts,'#ff9900');
    }
  }
  // walls
  for(const w of walls){
    const wx=w.x-cameraX;
    const nx2=Math.max(wx,Math.min(px,wx+w.w)), ny2=Math.max(w.y,Math.min(py,w.y+w.h));
    const dx=px-nx2, dy=py-ny2, d=Math.sqrt(dx*dx+dy*dy);
    if(d<PLAYER_R-2){ triggerDeath(); return; }
    if(d<PLAYER_R+14 && !closeCalls[w.id]){
      closeCalls[w.id]=1; const pts=2*mult(); score+=pts;
      addPop(px,py,'CLOSE! +'+pts,'#ff9900');
    }
  }
  // spiders
  for(const s of spiders){
    const sx=s.x-cameraX, dx=sx-px, dy=s.y-py;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<PLAYER_R+s.r-2){ triggerDeath(); return; }
    if(d<PLAYER_R+s.r+18 && !closeCalls[s.id]){
      closeCalls[s.id]=1; const pts=2*mult(); score+=pts;
      addPop(px,py,'CLOSE! +'+pts,'#ff9900');
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt;
    p.life-=dt; if(p.life<=0){ particles.splice(i,1); continue; }
    p.alpha=p.life/p.max;
  }
  // pop texts
  for(let i=popTexts.length-1;i>=0;i--){
    const t=popTexts[i];
    t.y-=48*dt; t.life-=dt;
    if(t.life<=0){ popTexts.splice(i,1); continue; }
    t.alpha=t.life/t.max;
    t.sc=1+0.5*(1-t.life/t.max);
  }
  // speed lines
  for(let i=speedLines.length-1;i>=0;i--){
    const l=speedLines[i]; l.x-=620*dt; l.life-=dt;
    if(l.life<=0) speedLines.splice(i,1);
  }

  // shake
  if(shakeAmt>0){
    shakeAmt=Math.max(0,shakeAmt-dt*6);
    shakeX=(Math.random()-0.5)*shakeAmt*2.5;
    shakeY=(Math.random()-0.5)*shakeAmt*2.5;
  } else { shakeX=0; shakeY=0; }

  if(redFlash>0) redFlash=Math.max(0,redFlash-dt*3);
  hue = 110 + (mult()-1)*22 + elapsed*1.6;
}

// ── Death ─────────────────────────────────────────────────────────────────────
function triggerDeath(){
  state='gameover'; anchored=false;
  const fs=Math.floor(score);
  if(fs>bestScore){ bestScore=fs; localStorage.setItem(LS_KEY,fs); }
  shake(14); redFlash=1;
  for(let i=0;i<32;i++) deathParticle(px,py);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function shake(a){ shakeAmt=Math.max(shakeAmt,a); }

function burst(x,y,color,n,sp){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=sp*0.6+Math.random()*sp;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color,r:2+Math.random()*3,life:0.45,max:0.45,alpha:1});
  }
}

function deathParticle(x,y){
  const a=Math.random()*Math.PI*2, s=90+Math.random()*220;
  const h=Math.random()*60;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
    color:`hsl(${h},100%,60%)`,r:3+Math.random()*5,life:0.9+Math.random()*0.5,max:1.4,alpha:1});
}

function addPop(x,y,text,color){
  popTexts.push({x,y:y-22,text,color,life:0.9,max:0.9,alpha:1,sc:1});
}

function emitSpeedLine(){
  speedLines.push({x:CW+60,y:50+Math.random()*(CH-100),
    len:45+Math.random()*90,alpha:0.3+Math.random()*0.4,life:0.3,max:0.3});
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // bg gradient
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0, `hsl(${hue},42%,7%)`);
  g.addColorStop(1, `hsl(${hue+40},52%,11%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

  // bg silhouettes
  ctx.save(); ctx.globalAlpha=0.05;
  ctx.fillStyle=`hsl(${hue+60},60%,30%)`;
  const off2=cameraX*0.1%200;
  for(let i=-1;i<Math.ceil(CW/200)+2;i++){
    const bx=i*200-off2;
    ctx.beginPath(); ctx.arc(bx,0,90,0,Math.PI); ctx.fill();
    ctx.beginPath(); ctx.arc(bx+100,CH,105,Math.PI,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // speed lines
  for(const l of speedLines){
    ctx.save();
    ctx.globalAlpha=l.alpha*(l.life/l.max);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(l.x+l.len,l.y); ctx.stroke();
    ctx.restore();
  }

  // nodes
  for(const n of nodes){
    const nx=n.x-cameraX;
    if(nx<-30||nx>CW+30) continue;
    n.w+=0.025;
    const wb=Math.sin(n.w)*2;
    ctx.save();
    ctx.shadowColor=n.dead?'#441100':`hsl(${hue+20},80%,50%)`;
    ctx.shadowBlur=n.dead?4:10;
    ctx.fillStyle=n.dead?'#553322':`hsl(${hue+20},60%,32%)`;
    ctx.beginPath(); ctx.arc(nx+wb,n.y,n.r,0,Math.PI*2); ctx.fill();
    if(!n.dead){
      ctx.fillStyle=`hsl(${hue+30},90%,65%)`;
      ctx.beginPath(); ctx.arc(nx+wb-2,n.y-2,3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // leaves
  for(const l of leaves){
    const lx=l.x-cameraX;
    if(lx<-20||lx>CW+20) continue;
    l.bob+=0.05;
    const bob=Math.sin(l.bob)*3;
    ctx.save();
    ctx.shadowColor=l.gold?'#ffd700':`hsl(${hue+40},90%,50%)`;
    ctx.shadowBlur=l.gold?14:7;
    ctx.fillStyle=l.gold?'#ffd700':`hsl(${hue+40},80%,45%)`;
    ctx.beginPath(); ctx.ellipse(lx,l.y+bob,l.r*1.3,l.r*0.75,Math.PI*0.25,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle=l.gold?'#ffffa0':'#aaff88'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }

  // thorns
  for(const t of thorns){
    const tx=t.x-cameraX;
    if(tx<-20||tx>CW+20) continue;
    ctx.save();
    ctx.shadowColor='#ff3300'; ctx.shadowBlur=10;
    ctx.fillStyle='#cc1100'; ctx.strokeStyle='#ff5533'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<7;i++){
      const a=(i/7)*Math.PI*2-Math.PI*0.5;
      const r2=i%2===0?t.r:t.r*0.38;
      if(i===0) ctx.moveTo(tx+Math.cos(a)*r2,t.y+Math.sin(a)*r2);
      else ctx.lineTo(tx+Math.cos(a)*r2,t.y+Math.sin(a)*r2);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // walls
  for(const w of walls){
    const wx=w.x-cameraX;
    if(wx<-30||wx>CW+30) continue;
    ctx.save();
    ctx.shadowColor='#773300'; ctx.shadowBlur=7;
    const wg=ctx.createLinearGradient(wx,0,wx+w.w,0);
    wg.addColorStop(0,'#441100'); wg.addColorStop(1,'#885533');
    ctx.fillStyle=wg; ctx.fillRect(wx,w.y,w.w,w.h);
    ctx.strokeStyle='#aa6633'; ctx.lineWidth=1; ctx.strokeRect(wx,w.y,w.w,w.h);
    // bark lines
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    for(let bi=0;bi<Math.floor(w.h/15);bi++){
      ctx.beginPath(); ctx.moveTo(wx,w.y+bi*15+7); ctx.lineTo(wx+w.w,w.y+bi*15+7); ctx.stroke();
    }
    ctx.restore();
  }

  // spiders
  for(const s of spiders){
    const sx=s.x-cameraX;
    if(sx<-30||sx>CW+30) continue;
    ctx.save();
    ctx.shadowColor='#aa00aa'; ctx.shadowBlur=12;
    // thread
    ctx.strokeStyle='rgba(180,100,200,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx,s.y); ctx.lineTo(sx,s.y-40); ctx.stroke();
    // legs
    ctx.strokeStyle='#aa44bb'; ctx.lineWidth=1.5;
    for(let i=0;i<8;i++){
      const la=(i/8)*Math.PI*2;
      const la2=la+Math.sin(elapsed*5+i)*0.4;
      ctx.beginPath();
      ctx.moveTo(sx+Math.cos(la)*s.r, s.y+Math.sin(la)*s.r);
      ctx.lineTo(sx+Math.cos(la2)*s.r*2.8, s.y+Math.sin(la2)*s.r*2.8);
      ctx.stroke();
    }
    ctx.fillStyle='#220033';
    ctx.beginPath(); ctx.arc(sx,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#dd44ff'; ctx.lineWidth=1.5; ctx.stroke();
    // eyes
    ctx.fillStyle='#ff44ff';
    ctx.beginPath(); ctx.arc(sx-3,s.y-2,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+3,s.y-2,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // vine rope
  if(anchored && anchorNode){
    const ax=anchorNode.x-cameraX, ay=anchorNode.y;
    const spd=Math.sqrt(pvx*pvx+pvy*pvy);
    const wb=Math.sin(elapsed*8)*3*(spd/200);
    const mx=(px+ax)*0.5+wb, my=(py+ay)*0.5;
    ctx.save();
    ctx.strokeStyle=`hsl(${hue+10},70%,32%)`; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.shadowColor=`hsl(${hue+10},80%,50%)`; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.quadraticCurveTo(mx,my,ax,ay); ctx.stroke();
    ctx.strokeStyle=`hsl(${hue+25},90%,62%)`; ctx.lineWidth=2; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.quadraticCurveTo(mx,my,ax,ay); ctx.stroke();
    ctx.restore();
  }

  // player
  ctx.save();
  ctx.shadowColor=`hsl(${hue+30},100%,70%)`; ctx.shadowBlur=22;
  ctx.strokeStyle=`hsl(${hue+20},90%,65%)`; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(px,py,PLAYER_R+3,0,Math.PI*2); ctx.stroke();
  const pg=ctx.createRadialGradient(px-3,py-3,1,px,py,PLAYER_R);
  pg.addColorStop(0, `hsl(${hue+45},100%,82%)`);
  pg.addColorStop(1, `hsl(${hue},80%,38%)`);
  ctx.fillStyle=pg;
  ctx.beginPath(); ctx.arc(px,py,PLAYER_R,0,Math.PI*2); ctx.fill();
  const spd2=Math.sqrt(pvx*pvx+pvy*pvy);
  if(spd2>60){
    ctx.strokeStyle='rgba(255,255,255,0.38)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px,py);
    ctx.lineTo(px+pvx/spd2*22, py+pvy/spd2*22); ctx.stroke();
  }
  ctx.restore();

  // particles
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // pop texts
  for(const t of popTexts){
    ctx.save(); ctx.globalAlpha=t.alpha;
    ctx.translate(t.x,t.y); ctx.scale(t.sc,t.sc);
    ctx.fillStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=9;
    ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign='center';
    ctx.fillText(t.text,0,0);
    ctx.restore();
  }

  // red flash
  if(redFlash>0){
    ctx.save(); ctx.globalAlpha=redFlash*0.42;
    ctx.fillStyle='#ff0000'; ctx.fillRect(0,0,CW,CH); ctx.restore();
  }

  // HUD
  if(state==='playing'){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.roundRect(8,8,154,52,8); ctx.fill();
    ctx.fillStyle='#ffffff'; ctx.font='bold 24px "Segoe UI",sans-serif';
    ctx.textAlign='left'; ctx.fillText(Math.floor(score),18,34);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='12px "Segoe UI",sans-serif';
    ctx.fillText('BEST '+bestScore,18,50);
    if(combo>0){
      const m=mult();
      ctx.fillStyle=m>1?`hsl(${hue+20},100%,65%)`:'rgba(255,255,255,0.6)';
      ctx.font=`bold ${14+m*3}px "Segoe UI",sans-serif`;
      ctx.textAlign='right';
      ctx.fillText('x'+m+' COMBO '+combo, CW-12, 36);
    }
    ctx.restore();
  }

  ctx.restore(); // shake restore

  // overlay screens (no shake)
  if(state==='start') drawStart();
  if(state==='gameover') drawGameOver();
}

function drawStart(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.58)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';
  ctx.shadowColor='#44ff44'; ctx.shadowBlur=32;
  ctx.fillStyle=`hsl(${hue},90%,65%)`; ctx.font='bold 60px "Segoe UI",sans-serif';
  ctx.fillText('VINE',CW/2,CH*0.34);
  ctx.fillStyle=`hsl(${hue+40},100%,70%)`; ctx.font='bold 50px "Segoe UI",sans-serif';
  ctx.fillText('RUSH',CW/2,CH*0.34+62);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.68)'; ctx.font='14px "Segoe UI",sans-serif';
  ctx.fillText('Snap to branches  •  Collect leaves  •  Dodge hazards',CW/2,CH*0.55);
  const p=0.68+0.32*Math.sin(Date.now()*0.004);
  ctx.globalAlpha=p; ctx.fillStyle='#ffffff';
  ctx.font='bold 22px "Segoe UI",sans-serif'; ctx.fillText('TAP TO START',CW/2,CH*0.7);
  ctx.restore();
}

function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';
  ctx.shadowColor='#ff4422'; ctx.shadowBlur=22;
  ctx.fillStyle='#ff6644'; ctx.font='bold 48px "Segoe UI",sans-serif';
  ctx.fillText('GAME OVER',CW/2,CH*0.3);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffffff'; ctx.font='bold 34px "Segoe UI",sans-serif';
  ctx.fillText(Math.floor(score),CW/2,CH*0.45);
  ctx.fillStyle='rgba(255,255,255,0.52)'; ctx.font='16px "Segoe UI",sans-serif';
  ctx.fillText('SCORE',CW/2,CH*0.45+24);
  if(Math.floor(score)>=bestScore && bestScore>0){
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=16;
    ctx.font='bold 18px "Segoe UI",sans-serif'; ctx.fillText('NEW BEST!',CW/2,CH*0.54);
    ctx.shadowBlur=0;
  } else {
    ctx.fillStyle='rgba(255,255,255,0.48)'; ctx.font='14px "Segoe UI",sans-serif';
    ctx.fillText('BEST: '+bestScore,CW/2,CH*0.54);
  }
  const p=0.68+0.32*Math.sin(Date.now()*0.004);
  ctx.globalAlpha=p; ctx.fillStyle='#ffffff';
  ctx.font='bold 22px "Segoe UI",sans-serif'; ctx.fillText('TAP TO RETRY',CW/2,CH*0.7);
  ctx.restore();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts;
  if(state==='playing') update(dt);
  draw();
}
requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
